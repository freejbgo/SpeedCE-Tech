title: SpeedCE CSDN 文章库
description: >-
  多节点网站测速 · 网络排障 · 210+ 篇 CSDN 实战长文。
  SpeedCE 免费在线测速工具：https://speedce.com/?lang=zh-CN
lang: zh-CN
url: https://freejbgo.github.io
baseurl: /SpeedCE-Tech

theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM

defaults:
  - scope:
      path: "articles"
      type: "pages"
    values:
      layout: default
      permalink: /articles/:name.html

exclude:
  - articles/README.md
